apiVersion: v1
kind: Namespace
metadata:
  name: quasar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-catalog-db
  namespace: quasar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-catalog-db
  template:
    metadata:
      labels:
        app: iceberg-catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "iceberg_user"
            - name: POSTGRES_PASSWORD
              value: "secure_password_here"
            - name: POSTGRES_DB
              value: "iceberg_catalog"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-catalog-db
  namespace: quasar
spec:
  ports:
    - port: 5432
  selector:
    app: iceberg-catalog-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest-catalog
  namespace: quasar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest-catalog
  template:
    metadata:
      labels:
        app: iceberg-rest-catalog
    spec:
      initContainers:
        - name: migration
          image: quay.io/lakekeeper/catalog:latest
          args: ["migrate"]
          env:
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              value: "secure_encryption_key_must_be_long_enough_12345"
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: "postgresql://iceberg_user:secure_password_here@iceberg-catalog-db.quasar.svc.cluster.local:5432/iceberg_catalog"
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: "postgresql://iceberg_user:secure_password_here@iceberg-catalog-db.quasar.svc.cluster.local:5432/iceberg_catalog"
            - name: RUST_LOG
              value: "info"
      containers:
        - name: catalog
          image: quay.io/lakekeeper/catalog:latest
          args: ["serve"]
          ports:
            - containerPort: 8181
          env:
            # 内部暗号化用キー（本番環境では十分な長さのランダム文字列を Secret から注入してください）
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              value: "secure_encryption_key_must_be_long_enough_12345"
            # データベース書き込み/読み込み用のURL設定
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: "postgresql://iceberg_user:secure_password_here@iceberg-catalog-db.quasar.svc.cluster.local:5432/iceberg_catalog"
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: "postgresql://iceberg_user:secure_password_here@iceberg-catalog-db.quasar.svc.cluster.local:5432/iceberg_catalog"
            - name: RUST_LOG
              value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest-catalog
  namespace: quasar
spec:
  ports:
    - port: 8181
      targetPort: 8181
  selector:
    app: iceberg-rest-catalog
